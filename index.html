<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jgestoree - Top Up Game Termurah</title>
    <style>
        /* Reset & Base Typography */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f8f9fa; }

        /* Navigation Header */
        header { 
            background: #ffffff; 
            padding: 15px 50px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #e0e0e0; 
        }
        .logo { color: #b30000; font-size: 28px; font-weight: 900; letter-spacing: -1px; }
        nav a { margin: 0 15px; text-decoration: none; color: #111; font-weight: 700; font-size: 14px; }
        .search-bar { padding: 10px 20px; border: 1px solid #ddd; border-radius: 50px; width: 220px; background: #f5f5f5;}
        .btn-login { background: #b30000; color: white; padding: 10px 30px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Hero Banner Section */
        .hero { 
            background: #b30000; 
            color: white; 
            text-align: center; 
            padding: 80px 20px; 
            margin: 20px 50px; 
            border-radius: 24px; 
            box-shadow: 0 10px 20px rgba(179, 0, 0, 0.2);
        }
        .hero h1 { font-size: 48px; text-transform: uppercase; margin-bottom: 10px; font-weight: 900; letter-spacing: 2px;}
        .hero h2 { font-size: 24px; color: #ffcc00; text-transform: uppercase; margin-bottom: 40px; font-weight: 800;}
        
        /* Value Proposition Cards */
        .features { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .feature-box { 
            background: white; 
            color: #b30000; 
            padding: 12px 24px; 
            border-radius: 8px; 
            font-weight: 700; 
            font-size: 15px; 
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">JGESTOREE</div>
    <nav>
        <a href="#">Beranda</a>
        <a href="#">Cek Pesanan</a>
        <a href="#">Kalkulator</a>
        <a href="#">Artikel</a>
    </nav>
    <div>
        <input type="text" class="search-bar" placeholder="Cari Nama Game...">
        <button class="btn-login">Login</button>
    </div>
</header>

<section class="hero">
    <h1>Top Game Apapun</h1>
    <h2>Cepat dan Terjangkau</h2>
    
    <div class="features">
        <div class="feature-box">⚡ Bayar dalam hitungan detik</div>
        <div class="feature-box">💳 Metode pembayaran terbaik</div>
        <div class="feature-box">🚗 Pengiriman instan</div>
        <div class="feature-box">🛡️ Aman dan terpercaya</div>
    </div>
</section>

</body>
</html>
